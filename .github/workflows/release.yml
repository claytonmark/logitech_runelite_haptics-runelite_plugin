name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Build
        run: ./gradlew jar

      - name: Rename jar
        run: mv build/libs/*.jar runelite-haptics.jar

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: runelite-haptics.jar
          generate_release_notes: true
